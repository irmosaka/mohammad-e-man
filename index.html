<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محمدِ من</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
        
        body { 
            font-family: 'Vazirmatn', system-ui, sans-serif; 
            margin:0; padding:0; 
            background: linear-gradient(135deg, #ff9ec3, #ffb6c1, #ffc0cb); 
            color:#333; text-align:center; min-height:100vh; 
        }
        header { 
            background:#ff69b4; color:white; padding:25px 15px;
            box-shadow: 0 4px 15px rgba(255,105,180,0.4);
        }
        h1 { margin:0; font-size:2.8em; }
        .heart { color:#fff; animation:beat 1.1s infinite; }
        @keyframes beat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.35);} }
        
        .service-grid { 
            display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); 
            gap:20px; padding:30px 20px; max-width:900px; margin:0 auto; 
        }
        .service-card { 
            background:white; border-radius:22px; padding:25px;
            box-shadow:0 10px 25px rgba(255,105,180,0.2); transition:0.3s; cursor:pointer; 
        }
        .service-card:hover { transform:scale(1.08); box-shadow:0 15px 35px rgba(255,105,180,0.4); }
        
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:1000;
        }
        .modal-content {
            background:white; padding:35px; border-radius:25px; width:90%; max-width:460px;
            box-shadow:0 10px 30px rgba(255,105,180,0.5);
        }
        button { 
            background:#ff69b4; color:white; border:none; padding:14px 32px;
            border-radius:50px; font-size:1.1em; margin:10px; cursor:pointer; 
        }
        button:hover { background:#ff1493; transform:scale(1.05); }
        
        input, textarea { 
            font-family: 'Vazirmatn', system-ui, sans-serif;
            width:100%; padding:12px; margin:12px 0; border-radius:12px; border:2px solid #ffb6c1;
        }
        .history-item { 
            background:#fff; margin:12px 0; padding:16px; border-radius:18px;
            text-align:right; box-shadow:0 5px 15px rgba(255,105,180,0.15);
        }
    </style>
</head>
<body>
    <header>
        <h1>🧔🏻‍♂️ محمد من <span class="heart">❤️❤️</span></h1>
        <p>خدمات عاشقانه و صورتی برای غزال جونم 💖</p>
    </header>

    <!-- صفحه نام (اولویت بالا) -->
    <div id="nameScreen" class="modal">
        <div class="modal-content">
            <h3>کاربر گرامی، سلام! نام خود را وارد کنید :</h3>
            <input id="nameInput" type="text" placeholder="غزال" style="font-size:1.1em;">
            <button onclick="checkName()">ورود 💖</button>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <div style="padding:40px 20px; background:rgba(255,105,180,0.9); color:white;">
            <h2>غزال عزیزم، بگو چی لازم داری؟ 💕🥰</h2>
        </div>
        <div class="service-grid" id="services"></div>
        <div class="history" style="margin:40px auto; max-width:800px; padding:0 20px;">
            <h2>📜 درخواست‌های قبلی</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- Modal درخواست خدمت -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <h3 id="mTitle"></h3>
            <p id="mDesc"></p>
            
            <p><strong>آدرس:</strong></p>
            <label><input type="radio" name="address" value="شهر اصفهان" checked> شهر اصفهان</label><br><br>
            <label><input type="radio" name="address" value="دهات شاهین شهر"> دهات شاهین شهر</label>
            
            <textarea id="note" rows="3" placeholder="توضیح اضافی (اختیاری) 💖"></textarea>
            
            <div style="margin-top:25px;">
                <button onclick="confirmRequest()">بله، موافقم! آقای محمد صادقی کاجی اعزام شوند 🚀💕</button>
                <button onclick="funnyNo()" style="background:#aaa;">خیر</button>
            </div>
        </div>
    </div>

    <!-- Modal پیام -->
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <p id="customMessage" style="font-size:1.25em; line-height:1.6; margin:20px 0;"></p>
            <button onclick="closeMessageModal()">باشه 💖</button>
        </div>
    </div>

    <footer style="padding:25px; background:#333; color:white; margin-top:40px;">
        <p>ساخته شده با کلی قلب فقط برای غزال جون 💖🥰</p>
    </footer>

    <script>
        const services = [
            {icon:"❄️", title:"سرویس کولر آبی", desc:"کولر رو خنک‌تر از قطب جنوب می‌کنم!"},
            {icon:"🧹", title:"نظافت منزل", desc:"خونه رو برق می‌ندازم، بدون ذره ای گرد و خاک"},
            {icon:"🚗", title:"سرویس خودرو", desc:"ماشینتو تمیز و سرویس می‌کنم"},
            {icon:"🏡", title:"باغبانی", desc:"آبیاری درختان، نصب سایبان و خدمات باربیکیو"},
            {icon:"🍦", title:"پیاده‌روی عاشقانه", desc:"دست تو دست، با بستنی و عشق"},
            {icon:"🥰", title:"شارژ عاطفی و بوسه", desc:"بوسه تحویل در محل + شارژ عاطفی فوری 💕"}
        ];

        let currentService = {};

        function showMessage(text) {
            document.getElementById('customMessage').innerHTML = text;
            document.getElementById('messageModal').style.display = 'flex';
        }

        function closeMessageModal() {
            document.getElementById('messageModal').style.display = 'none';
        }

        function checkName() {
            const name = document.getElementById('nameInput').value.trim();
            if (name === '') {
                showMessage('❌ لطفاً اسم خود را وارد کنید!<br>نمی‌تواند خالی باشد 💖');
                return;
            }
            if (name.toLowerCase() === 'ghazal' || name.toLowerCase() === 'غزال') {
                document.getElementById('nameScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                localStorage.setItem('nameEntered', 'true');
                renderServices();
                loadHistory();
            } else {
                showMessage('😘 فقط برای خانم غزال عزیزم!<br>بقیه اجازه ورود ندارن 💖');
            }
        }

        function renderServices() {
            const container = document.getElementById('services');
            container.innerHTML = services.map(s => `
                <div class="service-card" onclick="openRequest('${s.title}', '${s.desc}')">
                    <div style="font-size:3.8em;margin-bottom:15px;">${s.icon}</div>
                    <h3>${s.title}</h3>
                    <p>${s.desc}</p>
                </div>
            `).join('');
        }

        function openRequest(title, desc) {
            currentService = {title, desc};
            document.getElementById('mTitle').textContent = title;
            document.getElementById('mDesc').textContent = desc;
            document.getElementById('requestModal').style.display = 'flex';
        }

        function confirmRequest() {
            const selectedAddress = document.querySelector('input[name="address"]:checked').value;
            const note = document.getElementById('note').value || '❤️';
            
            const request = { title: currentService.title, address: selectedAddress, note: note, time: new Date().toLocaleString('fa-IR') };
            
            let history = JSON.parse(localStorage.getItem('requests')) || [];
            history.unshift(request);
            localStorage.setItem('requests', JSON.stringify(history));
            
            showMessage(`💖 بله! آقای محمد صادقی کاجی فوراً به سمت ${selectedAddress} حرکت کردند...`);
            closeModals();
            loadHistory();
        }

        function funnyNo() {
            const messages = ["😢 دل محمد شکست... دوباره امتحان کن عزیزم!", "نه؟! خب پس امشب بوسه نمی‌دم 💋", "آخه چرا؟ محمد من همیشه در خدمته...", "این یکی رو ول کن، بله رو بزن که قلبم شاد بشه 💕", "نه گفتن ممنوعه! فقط بله 😘", "محمد الان داره گریه می‌کنه... بله بزن جونم 🥺", "خیر؟! پس منم میرم خونه مامانم! 😂"];
            showMessage(messages[Math.floor(Math.random() * messages.length)]);
        }

        function closeModals() {
            document.getElementById('requestModal').style.display = 'none';
            document.getElementById('note').value = '';
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('requests')) || [];
            list.innerHTML = history.map(r => `
                <div class="history-item">
                    <strong>${r.title}</strong><br>
                    📍 ${r.address}<br>
                    <small>${r.time} — ${r.note}</small>
                </div>
            `).join('');
        }

        // شروع مستقیم صفحه نام
        window.onload = () => {
            document.getElementById('nameScreen').style.display = 'flex';
        };
    </script>
</body>
</html>
